<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCC Juvenile Handbook Portal</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>
 
</head>
<body class="overflow-x-hidden">
    <div id="navigation-container"></div>
  
    <!-- Main Landing Page Content -->
    <main class="p-4 sm:p-6 md:p-12 max-w-3xl mx-auto">

        <div class="mt-6">
            <a href="https://docs.google.com/spreadsheets/d/1cCwhywJipHCav7OyAiOqs7ZlrTqhCrWf-0DJoy6c_m0/edit" 
             class="inline-block text-blue-600 hover:text-blue-800 font-medium underline">
            Current pitch schedule
            </a>
        </div>
    </main>
   <script>
        fetch('./nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navigation-container').innerHTML = data;
                // Load script.js AFTER navigation is inserted
                const script = document.createElement('script');
                script.src = './script.js';
                document.body.appendChild(script);
            });
    </script>
</body>
   
</html>
